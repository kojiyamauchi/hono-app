name: Pull Request CI

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  REFRESH_TOKEN_SECRET: ci-placeholder-refresh-token-secret
  PASSWORD_RESET_TOKEN_SECRET: ci-placeholder-password-reset-token-secret
  RESEND_API_KEY: ci-placeholder-resend-api-key
  PASSWORD_RESET_FROM_EMAIL: ci-placeholder@example.com
  PASSWORD_RESET_URL_BASE: https://ci-placeholder.example.com/reset-password
  SUPABASE_URL: http://127.0.0.1:54321
  SUPABASE_ANON_KEY: ci-placeholder-key
  ALLOWED_ORIGINS: http://localhost:3000

jobs:
  checks:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    strategy:
      # 1つのジョブが失敗しても他のジョブをキャンセルせず、全ジョブを完走させる
      fail-fast: false
      matrix:
        include:
          - job_name: Spell Check
            script: spellcheck
          - job_name: ESLint
            script: lint
          - job_name: Type Check
            script: typecheck
          - job_name: Unit Test
            script: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Execution Environment for Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun ci

      - name: Generate Prisma Client
        run: bun run prisma:generate

      - name: Do ${{ matrix.job_name }}
        run: bun run ${{ matrix.script }}

  build:
    name: Build Test
    needs:
      - checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Execution Environment for Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Dependencies
        run: bun ci

      - name: Generate Prisma Client
        run: bun run prisma:generate

      - name: Do Build
        run: bun run build
